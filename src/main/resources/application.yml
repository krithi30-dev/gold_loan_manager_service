spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/goldloan_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
    username: ${DB_USER:root}
    password: ${DB_PASS:Admin@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        type:
          preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:goldloanmanager-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiry-ms: 86400000

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

gold-loan:
  default-ltv-percent: 75
  default-interest-rate: 1.5

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.goldloan: DEBUG
